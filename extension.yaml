name: firestore-schema-validator
version: 0.1.0
specVersion: v1beta
displayName: Firestore Schema Validator
description: >-
  Validates Firestore documents against a JSON Schema before they are written.
  Invalid documents are deleted immediately after creation, preventing corrupt
  data from persisting in your database.
license: Apache-2.0
icon: icon.png
author:
  authorName: aaronat1
  authorUrl: https://github.com/aaronat1
sourceUrl: https://github.com/aaronat1/firestore-schema-validator
billingRequired: true

roles:
  - role: datastore.user
    reason: Required to delete invalid documents and write validation error reports.

resources:
  - name: validateSchemaL1
    type: firebaseextensions.v1beta.function
    description: Validates documents in top-level collections ({c1}/{d1}).
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}

  - name: validateSchemaL2
    type: firebaseextensions.v1beta.function
    description: Validates documents in depth-2 subcollections.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}

  - name: validateSchemaL3
    type: firebaseextensions.v1beta.function
    description: Validates documents in depth-3 subcollections.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}

  - name: validateSchemaL4
    type: firebaseextensions.v1beta.function
    description: Validates documents in depth-4 subcollections.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}/{c4}/{d4}

  - name: validateSchemaL5
    type: firebaseextensions.v1beta.function
    description: Validates documents in depth-5 subcollections.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.create
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}/{c4}/{d4}/{c5}/{d5}

params:
  - param: LOCATION
    label: Cloud Functions location
    description: >-
      Where do you want to deploy the functions created for this extension?
    type: select
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Taiwan (asia-east1)
        value: asia-east1
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Singapore (asia-southeast1)
        value: asia-southeast1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
    required: true
    immutable: true

  - param: COLLECTION_SCHEMAS
    label: Collection schemas (JSON)
    description: >-
      A JSON object mapping collection names to their JSON Schema definitions.
      Example: {"users":{"required":["email","name"],"properties":{"email":{"type":"string"},"name":{"type":"string"}}}}
    type: string
    required: true

  - param: ERRORS_COLLECTION
    label: Validation errors collection
    description: >-
      Collection where validation failure reports are written.
      Leave empty to disable error reporting.
    type: string
    default: _ext_validation_errors
    required: false

  - param: ON_INVALID
    label: Action on invalid document
    description: >-
      What to do when a document fails validation.
    type: select
    options:
      - label: Delete the document
        value: delete
      - label: Log the error only (keep the document)
        value: log
    default: delete
    required: true
